# ─────────────────────────────────────────────
# Workspace Switching (Numbered)
# ─────────────────────────────────────────────
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

# ─────────────────────────────────────────────
# Workspace Switching (Named)
# ─────────────────────────────────────────────
bindsym $mod+p workspace music
bindsym $mod+n workspace notes
bindsym $mod+s workspace extra
bindsym $mod+e workspace file-manager
bindsym $mod+t workspace torrent

# ─────────────────────────────────────────────
# Move Focused Container to Workspace (Numbered)
# ─────────────────────────────────────────────
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10

# ─────────────────────────────────────────────
# Move Focused Container to Workspace (Named)
# ─────────────────────────────────────────────
bindsym $mod+Shift+p move container to workspace music
bindsym $mod+Shift+n move container to workspace notes
bindsym $mod+Shift+s move container to workspace extra
bindsym $mod+Shift+e move container to workspace file-manager
bindsym $mod+Shift+t move container to workspace torrent

# ─────────────────────────────────────────────
# Switch Workspaces with Arrow Keys
# ─────────────────────────────────────────────
bindsym $mod+Left  workspace prev
bindsym $mod+Down  workspace prev
bindsym $mod+Up    workspace next
bindsym $mod+Right workspace next

# ─────────────────────────────────────────────
# Assign Workspaces to Monitors
# ─────────────────────────────────────────────
workspace 1  output $home_monitor
workspace 2  output $home_monitor
workspace 3  output $home_monitor
workspace 4  output $home_monitor
workspace 5  output $home_monitor
workspace 6  output $home_monitor
workspace 7  output $home_monitor
workspace 8  output $home_monitor
workspace 9  output $home_monitor
workspace 10 output eDP-1

# ─────────────────────────────────────────────
# Enable Workspace Auto Toggle (Back-and-Forth)
# ─────────────────────────────────────────────
workspace_auto_back_and_forth yes
