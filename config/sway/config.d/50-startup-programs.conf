# ─────────────────────────────────────────────
# Startup Applications
# ─────────────────────────────────────────────
exec playerctld daemon & \
    lxqt-policykit-agent & \
    gammastep & \
    nm-applet & \
    kdeconnectd & \
    sway-audio-idle-inhibit & \
    swaykbdd & \
    /usr/bin/python3 $HOME/.config/waybar/scripts/mediaplayer.py > $HOME/.cache/waybar-media-output.log
    # kanshi
    #autotiling & \

exec dunst

# exec /usr/bin/python3 $HOME/.config/waybar/scripts/mediaplayer.py --exclude firefox,brave,chromium > $HOME/.cache/waybar-media-output.log 2>&1 &

# ─────────────────────────────────────────────
# Clipboard History (cliphist) + Wob Volume/Brightness HUD
# ─────────────────────────────────────────────
exec rm -f "$HOME/.cache/cliphist/db" && wl-paste --watch cliphist store 
exec rm -f $WOBSOCK && mkfifo $WOBSOCK && tail -f $WOBSOCK | wob 

# ─────────────────────────────────────────────
# Launch apps on select empty workspaces
# ─────────────────────────────────────────────
exec $scripts/empty-ws-launcher.sh

# ─────────────────────────────────────────────
# Power Management (swayidle)
# ─────────────────────────────────────────────
# - Lock on 4 minutes idle
# - Turn off displays at 6 minutes
# - Suspend at 15 minutes
# - Lock before suspending
exec swayidle -w \
    timeout 240 'swaylock -f -c 000000' \
    timeout 360 'swaymsg "output * power off"' \
    resume 'swaymsg "output * power on"' \
    timeout 900 'systemctl suspend' \
    before-sleep 'swaylock -f -c 000000' &
